name: Deploy backend to VPS

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull, build, restart pm2 on VPS
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/djaber/backend

            echo '--- git pull ---'
            git fetch --depth 1 origin master
            git reset --hard origin/master

            echo '--- npm install (idempotent; ~2-5s if no change) ---'
            npm install --no-audit --no-fund --loglevel=error

            echo '--- prisma generate ---'
            ./node_modules/.bin/prisma generate >/dev/null

            echo '--- prisma db push (test DB; safe to sync schema) ---'
            ./node_modules/.bin/prisma db push --skip-generate --accept-data-loss

            echo '--- build ---'
            npm run build

            echo '--- pm2 reload ---'
            pm2 reload djaber-api --update-env || pm2 start dist/server.js --name djaber-api

            echo '--- health probe (retry up to 10s) ---'
            for i in 1 2 3 4 5; do
              sleep 2
              if curl -fsS -o /dev/null -w "HTTP %{http_code} in %{time_total}s on attempt $i\n" http://127.0.0.1:6101/health; then
                exit 0
              fi
            done
            echo 'Health check never recovered — failing deploy'
            pm2 logs djaber-api --lines 30 --nostream || true
            exit 1
